<button id="tts-toggle" class="tts-toggle" aria-label="Afficher le lecteur audio" title="Lecteur audio">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
</button>
<div id="tts-player" class="tts-player tts-hidden" aria-label="Lecteur audio">
  <div class="tts-progress-track">
    <div id="tts-progress" class="tts-progress-bar"></div>
  </div>
  <div class="tts-controls">
    <button id="tts-prev" class="tts-btn tts-btn-nav" aria-label="Segment precedent" title="Precedent">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>
    <button id="tts-play" class="tts-btn tts-btn-play" aria-label="Lire la page" title="Lire">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
    </button>
    <button id="tts-pause" class="tts-btn tts-btn-pause" aria-label="Pause" title="Pause" style="display:none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>
    </button>
    <button id="tts-stop" class="tts-btn tts-btn-stop" aria-label="Stop" title="Stop">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
    </button>
    <button id="tts-next" class="tts-btn tts-btn-nav" aria-label="Segment suivant" title="Suivant">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>
    <span id="tts-status" class="tts-status">Pret</span>
    <span id="tts-voice-info" class="tts-voice-info"></span>
    <label class="tts-speed-label" title="Vitesse de lecture">
      <span class="tts-speed-icon">x</span>
      <select id="tts-speed" class="tts-speed">
        <option value="0.75">0.75</option>
        <option value="0.9">0.9</option>
        <option value="1" selected>1</option>
        <option value="1.15">1.15</option>
        <option value="1.3">1.3</option>
        <option value="1.5">1.5</option>
        <option value="2">2</option>
      </select>
    </label>
  </div>
</div>
<script>window.__TTS_DICT = {{ site.data.tts_dictionary | jsonify }};</script>
<script defer src="{{ '/assets/tts.js' | relative_url }}?v=11"></script>
