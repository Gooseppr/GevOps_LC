<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Minima base styles -->
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <!-- Site custom styles (nav + design system) -->
  <link rel="stylesheet" href="{{ '/assets/nav.css' | relative_url }}?v=3">

  <!-- Mermaid (diagrams) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (!window.mermaid) return;
      // Convert Jekyll-generated pre > code.language-mermaid → div.mermaid
      document.querySelectorAll('pre > code.language-mermaid').forEach(function (code) {
        var pre = code.parentElement;
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        // Preserve original source for TTS (mermaid will replace innerHTML with SVG)
        div.setAttribute('data-mermaid-source', code.textContent);
        pre.replaceWith(div);
      });
      mermaid.initialize({
        startOnLoad: true,
        theme: 'default',
        flowchart: { useMaxWidth: true },
        sequence: { useMaxWidth: true }
      });
    });
  </script>

  <!-- Navigation sidebar -->
  <script>
    window.__SITE_BASEURL = "{{ '' | relative_url }}".replace(/\/$/, '');
  </script>
  <script defer src="{{ '/assets/nav.js' | relative_url }}?v=3"></script>
</head>
