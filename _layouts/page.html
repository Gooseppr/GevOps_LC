---
layout: default
---

{% if page.course %}<script>window.__COURSE_ID = {{ page.course | jsonify }};</script>{% endif %}

{% include course-lock.html course_id=page.course %}

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
